<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a2332;
  }

  /* ── Stake screenshot as background ── */
  .bg {
    position: fixed;
    inset: 0;
    background-image: url('./bg.png');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    filter: brightness(0.85);
    z-index: 0;
  }

  /* ── Game iframe overlay ──
     Positioned to match the white rectangle in the Stake screenshot.
     Adjust left/top/width/height percentages if your screenshot
     has different proportions.
  ── */
  .game-wrap {
    position: fixed;
    left: 25.5%;
    top: 9.5%;
    width: 62.5%;
    height: 73%;
    z-index: 10;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  #game-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Fullscreen button — sits just below the game area ── */
  .fs-btn {
    position: fixed;
    right: 72%;
    top: calc(9.5% + 73% + 6px);
    z-index: 20;
    width: 34px;
    height: 34px;
    background: rgba(20, 30, 44, 0.85);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, border-color .15s;
    color: #cdd8e0;
    backdrop-filter: blur(4px);
  }

  .fs-btn:hover {
    background: rgba(40, 55, 75, 0.95);
    border-color: rgba(255,255,255,0.35);
    color: #fff;
  }

  /* ── Fullscreen mode ── */
  body.fullscreen .bg { display: none; }

  body.fullscreen .game-wrap {
    left: 0; top: 0;
    width: 100%; height: 100%;
    border-radius: 0;
    box-shadow: none;
  }

  body.fullscreen .fs-btn {
    right: 12px;
    bottom: auto;
    top: 20px;
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="game-wrap">
  <iframe
    id="game-iframe"
    src="./wrapper.html"
    allow="fullscreen; autoplay"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
  ></iframe>
</div>

<button class="fs-btn" onclick="toggleFS()" title="Fullscreen (F)">
  <svg id="ico-exp" width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M1 5V2a1 1 0 0 1 1-1h3M9 1h3a1 1 0 0 1 1 1v3M13 9v3a1 1 0 0 1-1 1H9M5 13H2a1 1 0 0 1-1-1V9"
      stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
  <svg id="ico-col" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none">
    <path d="M5 1v4H1M9 1v4h4M1 9h4v4M13 9h-4v4"
      stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
  let fs = false;

  function toggleFS() {
    fs = !fs;
    document.body.classList.toggle('fullscreen', fs);
    document.getElementById('ico-exp').style.display = fs ? 'none' : '';
    document.getElementById('ico-col').style.display = fs ? '' : 'none';
    if (fs) document.documentElement.requestFullscreen?.().catch(() => {});
    else    document.exitFullscreen?.().catch(() => {});
  }

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && fs) {
      fs = false;
      document.body.classList.remove('fullscreen');
      document.getElementById('ico-exp').style.display = '';
      document.getElementById('ico-col').style.display = 'none';
    }
  });

  document.addEventListener('keydown', e => {
    if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey) toggleFS();
  });
</script>
</body>
</html>
